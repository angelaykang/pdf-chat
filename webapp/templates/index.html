<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="page">
        <aside class="sidebar">
            <div class="sidebar-inner">
                <div class="brand">
                    <div class="brand-badge">PDF</div>
                    <div>
                        <h2>PDF Chatbot</h2>
                        <p>Ask questions about your uploaded files</p>
                    </div>
                </div>

                <div class="panel">
                    <label for="mode">Model</label>
                    <select id="mode">
                        <option value="open_source" selected>Open Source</option>
                        <option value="openai">OpenAI</option>
                    </select>
                </div>

                <div class="panel">
                    <label for="pdfInput">Upload PDFs</label>
                    <input type="file" id="pdfInput" accept=".pdf" multiple />
                    <button id="uploadBtn" class="primary-btn">Upload and Process</button>
                </div>

                <div class="panel">
                    <div class="panel-title">Status</div>
                    <p id="statusText" class="status-text">No PDFs uploaded yet.</p>
                </div>

                <div class="panel">
                    <label class="checkbox-row">
                        <input type="checkbox" id="showSources" />
                        <span>Show source snippets</span>
                    </label>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <div>
                    <h1>Chat with your PDFs</h1>
                    <p class="subtitle">Upload documents, then ask questions in natural language.</p>
                </div>
            </div>

            <div id="chatWindow" class="chat-window">
                <div class="message bot">
                    <div class="message-card">
                        <div class="message-role">Assistant</div>
                        <div class="message-text">
                            Hello. Upload one or more PDF files and I will help answer questions based on them.
                        </div>
                    </div>
                </div>
            </div>

            <div class="composer-wrap">
                <div class="composer">
                    <input
                        type="text"
                        id="questionInput"
                        placeholder="Ask something about your PDFs..."
                    />
                    <button id="sendBtn" class="send-btn">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
